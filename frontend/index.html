<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Repositorio de Tareas</title>

  <link rel="stylesheet" href="./css/styles.css">
  <link rel="stylesheet" href="./css/modal.css">
</head>
<body>

  <h1>Repositorio de Tareas</h1>

  <!-- Crear tarea -->
  <section id="form-crear">
    <h2>Crear Tarea</h2>

    <input type="text" id="titulo" placeholder="Título">
    <input type="text" id="descripcion" placeholder="Descripción">
    <input type="date" id="fecha_entrega">
    <input type="text" id="instrucciones" placeholder="Instrucciones">
    <input type="number" id="nota_maxima" placeholder="Nota máxima">
    <input type="text" id="grupo" placeholder="Grupo">

    <button onclick="crearTarea()">Crear</button>
  </section>

  <!-- Materias -->
  <section id="modulo-materias">
    <h2>Materias disponibles</h2>
    <div id="lista-materias"></div>
  </section>

  <!-- Inscripciones -->
  <section id="modulo-inscripciones">
    <h2>Mis inscripciones</h2>
    <div id="lista-inscripciones"></div>
  </section>

  <!-- Organización -->
  <section id="modulo-organizacion">
    <h2>Filtrar Tareas</h2>

    <select id="select-materia">
      <option value="">-- Materia --</option>
    </select>

    <input type="text" id="input-grupo" placeholder="Grupo">

    <button onclick="aplicarFiltro()">Filtrar</button>
    <button onclick="limpiarFiltro()">Limpiar</button>

    <div id="conteo-materia"></div>
    <div id="tareas-filtradas"></div>
  </section>

  <!-- Lista general de tareas -->
  <section id="modulo-tareas">
    <h2>Lista de tareas</h2>
    <div id="tareas"></div>
  </section>

  <!-- Historial de entregas -->
  <section id="modulo-entregas">
    <h2>Mis Entregas</h2>
    <div id="lista-entregas"></div>
  </section>

  <!-- Modal entrega -->
  <div id="modal-entrega" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:100; justify-content:center; align-items:center;">
    <div style="background:white; padding:2rem; border-radius:8px; width:90%; max-width:500px;">
      <h2>Entregar Tarea</h2>
      <p id="modal-titulo-tarea"></p>

      <textarea
        id="input-contenido-entrega"
        placeholder="Escribe tu entrega o pega un enlace..."
        style="width:100%; height:120px; padding:0.5rem; margin-bottom:1rem; border:1px solid #ccc; border-radius:4px; resize:vertical; font-size:1rem;"
      ></textarea>

      <div style="display:flex; gap:1rem; justify-content:flex-end;">
        <button onclick="cerrarModalEntrega()" style="background:#ccc; border:none; padding:0.5rem 1rem; border-radius:4px; cursor:pointer;">
          Cancelar
        </button>
        <button onclick="confirmarEntrega()" style="background:#4CAF50; color:white; border:none; padding:0.5rem 1rem; border-radius:4px; cursor:pointer;">
          Confirmar envío
        </button>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast-entregas" style="display:none; position:fixed; bottom:2rem; right:2rem; color:white; padding:1rem 1.5rem; border-radius:8px; z-index:200;"></div>
 
 <!-- US5: Módulo de calificaciones (solo docente) -->
  <section id="modulo-calificaciones">
    <h2>Calificar Entregas</h2>
    <select id="select-tarea-calificar" onchange="cargarEntregasPorTarea()">
      <option value="">-- Selecciona una tarea --</option>
    </select>
    <div id="lista-entregas-docente"></div>
  </section>

  <!-- Modal calificar -->
  <div id="modal-calificar" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:100; justify-content:center; align-items:center;">
    <div style="background:white; padding:2rem; border-radius:8px; width:90%; max-width:500px;">
      <h2>Calificar Entrega</h2>
      <p><strong>Estudiante:</strong> <span id="cal-nombre-estudiante"></span></p>
      <p><strong>Entrega:</strong> <span id="cal-contenido"></span></p>
      <input type="number" id="input-nota" placeholder="Nota (0-100)" min="0" max="100" style="width:100%; padding:0.5rem; margin-bottom:1rem; border:1px solid #ccc; border-radius:4px;">
      <textarea id="input-retroalimentacion" placeholder="Retroalimentación (opcional)" style="width:100%; height:100px; padding:0.5rem; margin-bottom:1rem; border:1px solid #ccc; border-radius:4px; resize:vertical;"></textarea>
      <div style="display:flex; gap:1rem; justify-content:flex-end;">
        <button onclick="cerrarModalCalificar()" style="background:#ccc; border:none; padding:0.5rem 1rem; border-radius:4px; cursor:pointer;">Cancelar</button>
        <button onclick="confirmarCalificacion()" style="background:#4CAF50; color:white; border:none; padding:0.5rem 1rem; border-radius:4px; cursor:pointer;">Guardar Calificación</button>
      </div>
    </div>
  </div>

  <!-- Toast calificaciones -->
  <div id="toast-calificaciones" style="display:none; position:fixed; bottom:5rem; right:2rem; color:white; padding:1rem 1.5rem; border-radius:8px; z-index:200;"></div>

  <!-- 🔥 IMPORTANTE: ORDEN -->
  <script src="./js/api.js"></script>
  <script src="./js/tareas.js"></script>
  <script src="./js/detalles.js"></script>
  <script src="./js/inscripciones.js"></script>
  <script src="./js/organizacion.js"></script>
  <script src="./js/entregas.js"></script>
  <script src="./js/calificaciones.js"></script>

</body>
</html>
